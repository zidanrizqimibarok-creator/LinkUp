<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LinkUp v14 | Conecta Fluid</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #5856D6; --bg: #000; --glass: rgba(255, 255, 255, 0.7); --blur: blur(25px); --r: #FF3B30; --g: #4CD964; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; height: 100dvh; display: flex; justify-content: center; overflow: hidden; }
        
        /* WALLPAPER BACKGROUND */
        .bg-layer { position: fixed; inset: 0; background: linear-gradient(135deg, #1e1e2e 0%, #000000 100%); z-index: -1; }
        .circle { position: absolute; width: 300px; height: 300px; background: var(--p); filter: blur(100px); opacity: 0.3; border-radius: 50%; }

        .shell { width: 100%; max-width: 430px; height: 100dvh; position: relative; display: flex; flex-direction: column; overflow: hidden; }

        /* BOOTING */
        #boot { position: fixed; inset: 0; background: #fff; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s ease-in-out; }
        .b-logo { font-size: 45px; font-weight: 900; letter-spacing: -2px; transition: 1s; }

        /* HEADER FLUID GLASS */
        header { padding: 55px 25px 20px; background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid rgba(255,255,255,0.2); z-index: 100; }
        header h1 { font-size: 32px; font-weight: 800; color: #000; }

        /* MAIN AREA */
        .main { flex: 1; overflow-y: auto; padding: 15px 20px 120px; }
        .page { display: none; animation: slideUp 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* GLASS CARDS */
        .card { background: rgba(255,255,255,0.15); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: 24px; padding: 16px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); color: #fff; transition: 0.2s; }
        .card:active { transform: scale(0.97); background: rgba(255,255,255,0.25); }
        .av { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--p); }

        /* NAVIGATION BAR */
        .nav-b { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center; z-index: 900; }
        nav { width: 92%; background: rgba(255,255,255,0.2); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: 35px; padding: 15px; display: flex; justify-content: space-around; border: 1px solid rgba(255,255,255,0.2); }
        .n-i { font-size: 26px; opacity: 0.4; transition: 0.3s; color: #fff; }
        .n-i.active { opacity: 1; color: #fff; transform: translateY(-5px); text-shadow: 0 0 15px var(--p); }

        /* CHAT PANEL FLUID */
        .view { position: fixed; inset: 0; background: #000; z-index: 2000; transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .view.open { transform: translateX(0); }
        .msg-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: url('https://i.pinimg.com/736x/8c/98/99/8c98994518b575bfd8d994e518205a5e.jpg') center/cover; }
        .bubble { padding: 10px 16px; border-radius: 20px; max-width: 78%; font-size: 15px; position: relative; backdrop-filter: blur(10px); }
        .b-me { align-self: flex-end; background: var(--p); color: #fff; border-bottom-right-radius: 4px; }
        .b-them { align-self: flex-start; background: rgba(255,255,255,0.9); color: #000; border-bottom-left-radius: 4px; }

        /* CALL UI */
        #call-ui { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(40px); z-index: 100000; display: none; flex-direction: column; align-items: center; justify-content: space-around; color: #fff; }
    </style>
</head>
<body>

    <div class="bg-layer"><div class="circle" style="top:10%; right:10%"></div><div class="circle" style="bottom:20%; left:10%"></div></div>

    <div id="boot">
        <h1 id="logo" class="b-logo" style="color:var(--p)">LinkUp</h1>
        <p id="sub" style="font-weight:800; opacity:0; color:#888;">ACQUIRED BY CONECTA</p>
    </div>

    <div class="shell">
        <header>
            <h1 id="h-t">Chats</h1>
            <img id="my-av" onclick="openProfile()" class="av" style="cursor:pointer; width:45px; height:45px;">
        </header>

        <div class="main">
            <div id="p-chats" class="page active">
                <div id="chat-l"></div>
            </div>

            <div id="p-contacts" class="page">
                <div class="card" style="flex-direction:column; align-items:stretch; gap:10px;">
                    <p style="font-size:11px; font-weight:800; opacity:0.6;">TAMBAH LINKUP NUMBER</p>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="s-id" style="flex:1; background:rgba(255,255,255,0.1); border:none; padding:12px; border-radius:12px; color:#fff; outline:none;" placeholder="LNK-XXXX...">
                        <button onclick="addFriend()" style="background:var(--p); border:none; padding:0 20px; border-radius:12px; color:#fff; font-weight:700;">Tambah</button>
                    </div>
                </div>
                <div id="cont-l"></div>
            </div>
        </div>

        <div class="nav-b">
            <nav>
                <div class="n-i active" onclick="nav('chats','Chats',this)">💬</div>
                <div class="n-i" onclick="nav('contacts','Kontak',this)">👥</div>
            </nav>
        </div>

        <div id="v-chat" class="view">
            <header style="background:rgba(255,255,255,0.95)">
                <b onclick="closeChat()" style="color:var(--p); font-size:24px;">❮</b>
                <div style="flex:1; display:flex; align-items:center; gap:10px; margin-left:15px;">
                    <img id="c-av" class="av" style="width:40px; height:40px;">
                    <div><h4 id="c-n" style="color:#000"></h4><p style="font-size:10px; color:var(--g)">online</p></div>
                </div>
                <span onclick="doCall()" style="font-size:24px;">📞</span>
            </header>
            <div id="m-area" class="msg-area"></div>
            <div style="padding:15px 20px 40px; background:#fff; display:flex; gap:12px; align-items:center;">
                <input type="text" id="m-in" style="flex:1; padding:15px; border-radius:25px; border:1.5px solid #eee; outline:none;" placeholder="Tulis pesan...">
                <button id="vn-btn" style="border:none; background:none; font-size:24px;">🎤</button>
                <button onclick="sendMsg()" style="border:none; background:var(--p); color:#fff; width:48px; height:48px; border-radius:50%; font-size:20px;">➤</button>
            </div>
        </div>

        <div id="v-prof" class="view" style="transform:translateY(100%); background:var(--bg);">
            <header style="background:transparent; border:none;">
                <b onclick="closeProfile()" style="color:var(--p)">Selesai</b>
                <h3 style="color:#fff">My Identity</h3>
                <span></span>
            </header>
            <div style="padding:20px; text-align:center; color:#fff;">
                <img id="p-av-b" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--p);">
                <div id="qr-box" style="background:#fff; padding:15px; border-radius:20px; display:inline-block; margin-top:20px;"></div>
                <div style="margin-top:25px; text-align:left; background:rgba(255,255,255,0.1); padding:20px; border-radius:25px;">
                    <label style="font-size:11px; font-weight:800; opacity:0.5;">LINKUP NUMBER</label>
                    <p id="p-my-id" onclick="copyID()" style="font-size:22px; font-weight:900; color:var(--p); margin-bottom:15px;"></p>
                    <label style="font-size:11px; font-weight:800; opacity:0.5;">DISPLAY NAME</label>
                    <input type="text" id="p-name-in" style="width:100%; background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,0.2); color:#fff; font-size:18px; padding:10px 0; outline:none;">
                </div>
            </div>
        </div>

        <div id="call-ui">
            <div style="text-align:center;">
                <img id="call-av" style="width:140px; height:140px; border-radius:50%; border:4px solid var(--p);">
                <h2 id="call-name" style="margin-top:20px; font-size:32px;"></h2>
                <p>MENGHUBUNGKAN...</p>
            </div>
            <div style="display:flex; gap:30px;">
                <button onclick="endCall()" style="background:var(--r); border:none; width:80px; height:80px; border-radius:50%; font-size:30px; color:#fff;">🏁</button>
            </div>
        </div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const conf = { apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc", databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "xbook-global26" };
        const app = initializeApp(conf); const db = getDatabase(app);

        // --- IDENTITY ---
        let myId = localStorage.getItem('lu_id_v14') || ("LNK-"+Math.floor(1000+Math.random()*9000)+"-"+Math.random().toString(36).substr(2,4).toUpperCase());
        localStorage.setItem('lu_id_v14', myId);
        let myName = localStorage.getItem('lu_n14') || "Zidan User";
        let myAv = localStorage.getItem('lu_a14') || `https://api.dicebear.com/7.x/avataaars/svg?seed=${myId}`;
        
        const peer = new Peer(myId);
        let curT = null, localStream = null;

        // --- BOOTING TRANSITION ---
        setTimeout(() => {
            const l = document.getElementById('logo'); l.innerText = "Conecta"; l.style.color = "#000";
            document.getElementById('sub').style.opacity = "1";
            setTimeout(() => document.getElementById('boot').style.transform = 'translateY(-100%)', 1800);
        }, 1500);

        function sync() {
            set(ref(db, `users/${myId}`), { id: myId, name: myName, avatar: myAv });
            document.getElementById('my-av').src = myAv;
            document.getElementById('p-av-b').src = myAv;
            document.getElementById('p-name-in').value = myName;
            document.getElementById('p-my-id').innerText = myId;
            document.getElementById('qr-box').innerHTML = "";
            new QRCode(document.getElementById('qr-box'), { text: myId, width: 140, height: 140 });
        }
        sync();

        // --- FETCH CHATS & CONTACTS ---
        onValue(ref(db, `users/${myId}/friends`), (snap) => {
            const ch = document.getElementById('chat-l'), cl = document.getElementById('cont-l');
            ch.innerHTML = ""; cl.innerHTML = "";
            snap.forEach(c => {
                onValue(ref(db, `users/${c.val().id}`), (u) => {
                    const d = u.val(); if(!d) return;
                    const h = `
                        <img src="${d.avatar}" class="av">
                        <div style="flex:1"><b>${d.name}</b><br><small style="opacity:0.6">${d.id}</small></div>
                    `;
                    // Contact Item with Delete
                    const divCont = document.createElement('div'); divCont.className = 'card';
                    divCont.innerHTML = h + `<span onclick="delFriend(event, '${d.id}')" style="color:var(--r); font-weight:800">HAPUS</span>`;
                    divCont.onclick = () => openChat(d);
                    cl.appendChild(divCont);

                    // Chat Item
                    const divChat = document.createElement('div'); divChat.className = 'card';
                    divChat.innerHTML = h + `<span style="font-size:10px; opacity:0.5">12:00</span>`;
                    divChat.onclick = () => openChat(d);
                    ch.appendChild(divChat);
                });
            });
        });

        // --- LOGIC: ADD & AUTO OPEN ---
        window.addFriend = () => {
            const tid = document.getElementById('s-id').value.trim().toUpperCase();
            if(tid && tid !== myId) {
                set(ref(db, `users/${myId}/friends/${tid}`), { id: tid });
                onValue(ref(db, `users/${tid}`), (s) => {
                    if(s.exists()) {
                        document.getElementById('s-id').value = "";
                        openChat(s.val()); // Auto pindah ke chat
                    }
                }, { onlyOnce: true });
            }
        };

        window.delFriend = (e, tid) => {
            e.stopPropagation();
            if(confirm("Hapus kontak ini?")) remove(ref(db, `users/${myId}/friends/${tid}`));
        };

        window.openChat = (u) => {
            curT = u; document.getElementById('c-n').innerText = u.name;
            document.getElementById('c-av').src = u.avatar;
            document.getElementById('v-chat').classList.add('open');
            const chan = [myId, u.id].sort().join('_');
            onValue(ref(db, 'msgs/'+chan), (snap) => {
                const area = document.getElementById('m-area'); area.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const div = document.createElement('div');
                    div.className = `bubble ${d.s===myId ? 'b-me' : 'b-them'}`;
                    div.innerHTML = d.m + `<br><small style="font-size:9px; opacity:0.5">${d.read?'✓✓':'✓'}</small>`;
                    area.appendChild(div);
                    if(d.s !== myId && !d.read) update(ref(db, `msgs/${chan}/${m.key}`), { read: true });
                });
                area.scrollTop = area.scrollHeight;
            });
        };

        window.sendMsg = () => {
            const val = document.getElementById('m-in').value;
            if(val && curT) {
                push(ref(db, 'msgs/'+[myId, curT.id].sort().join('_')), { s:myId, m:val, t:Date.now(), read: false });
                document.getElementById('m-in').value = "";
            }
        };

        // --- CALL & PEER ---
        window.doCall = async () => {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('call-ui').style.display='flex';
            document.getElementById('call-name').innerText = curT.name;
            document.getElementById('call-av').src = curT.avatar;
            const call = peer.call(curT.id, localStream);
            call.on('stream', rs => document.getElementById('remote-audio').srcObject = rs);
        };

        peer.on('call', async c => {
            if(confirm("Telpon dari " + c.peer)) {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('call-ui').style.display='flex';
                c.answer(localStream);
                c.on('stream', rs => document.getElementById('remote-audio').srcObject = rs);
            }
        });

        window.endCall = () => {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            document.getElementById('call-ui').style.display = 'none';
        };

        // --- UI UTILS ---
        window.nav = (p, t, el) => {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            document.getElementById('h-t').innerText = t;
            document.querySelectorAll('.n-i').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
        };
        window.closeChat = () => document.getElementById('v-chat').classList.remove('open');
        window.openProfile = () => document.getElementById('v-prof').style.transform = 'translateY(0)';
        window.closeProfile = () => {
            myName = document.getElementById('p-name-in').value;
            localStorage.setItem('lu_n14', myName); sync();
            document.getElementById('v-prof').style.transform = 'translateY(100%)';
        };
        window.copyID = () => { navigator.clipboard.writeText(myId); alert("LinkUp Number Disalin!"); };
    </script>
</body>
</html>
