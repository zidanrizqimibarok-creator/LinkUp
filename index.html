<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LinkUp v27 | Glass Copy</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p: #5856D6; --glass: rgba(255, 255, 255, 0.08); --blur: blur(40px); --r: #FF3B30; --g: #4CD964; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        
        /* THEME: GLASS IPHONE DARK */
        .shell { width: 100%; max-width: 430px; height: 100%; position: relative; display: flex; flex-direction: column; background: radial-gradient(circle at top, #1c1c1e, #000); }
        header { padding: 55px 25px 15px; background: rgba(0,0,0,0.7); backdrop-filter: var(--blur); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
        
        /* TOP NOTIF */
        #top-notif { position: fixed; top: -100px; left: 5%; width: 90%; background: rgba(30,30,30,0.9); backdrop-filter: var(--blur); border-radius: 25px; padding: 15px; display: flex; align-items: center; gap: 12px; z-index: 20000; border: 1px solid rgba(255,255,255,0.1); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #top-notif.show { top: 20px; }

        .main { flex: 1; overflow-y: auto; padding: 10px 20px 150px; }
        .card { background: var(--glass); border-radius: 22px; padding: 18px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .av { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--p); background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .av img { width: 100%; height: 100%; object-fit: cover; }

        /* VIEW TRANSITION */
        .view { position: fixed; inset: 0; background: #000; z-index: 5000; transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .view.open { transform: translateX(0); }
        .view.up { transform: translateY(100%); transition: 0.5s; }
        .view.up.open { transform: translateY(0); }

        /* PROFILE SPECIFIC */
        .id-badge { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; margin: 15px auto; width: fit-content; font-family: monospace; border: 1px solid rgba(255,255,255,0.05); }
        .copy-btn { background: var(--p); padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; }

        /* CHAT BUBBLES */
        .m-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 16px; border-radius: 20px; max-width: 75%; font-size: 15px; line-height: 1.4; position: relative; }
        .b-me { align-self: flex-end; background: var(--p); border-bottom-right-radius: 4px; }
        .b-them { align-self: flex-start; background: #2c2c2e; border-bottom-left-radius: 4px; }
        
        /* NAV */
        .nav-b { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 2000; }
        nav { width: 92%; background: rgba(25,25,25,0.8); backdrop-filter: var(--blur); border-radius: 35px; padding: 18px; display: flex; justify-content: space-around; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        
        #boot { position: fixed; inset: 0; background: #fff; z-index: 100000; display: flex; align-items: center; justify-content: center; transition: 0.8s ease; }
        #boot h1 { color: #000; font-size: 40px; font-weight: 900; letter-spacing: -2px; }
        
        .av-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; padding: 0 10px; }
        .av-opt { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid transparent; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .av-opt.active { border-color: var(--p); transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="top-notif">
        <div id="nt-av" class="av" style="width:40px; height:40px;"></div>
        <div style="flex:1"><b id="nt-name">Nama</b><br><small id="nt-msg" style="opacity:0.7">Pesan baru...</small></div>
    </div>

    <div id="boot"><h1>LinkUp</h1></div>

    <div class="shell">
        <header>
            <h1 id="h-title">Chats</h1>
            <div style="display:flex; gap:20px; align-items:center;">
                <span onclick="openScanner()" style="font-size:24px; cursor:pointer;">📷</span>
                <div id="my-av" onclick="openProf()" class="av" style="width:42px; height:42px; cursor:pointer;"></div>
            </div>
        </header>

        <div class="main">
            <div id="p-chats" class="page"><div id="chat-l"></div></div>
            <div id="p-cont" class="page" style="display:none;"><div id="cont-l"></div></div>
        </div>

        <div class="nav-b">
            <nav>
                <div onclick="nav('chats','Chats',this)" style="opacity:1; cursor:pointer; font-size:24px;">💬</div>
                <div onclick="nav('cont','Kontak',this)" style="opacity:0.3; cursor:pointer; font-size:24px;">👥</div>
                <div onclick="addManual()" style="cursor:pointer; font-size:24px;">➕</div>
            </nav>
        </div>

        <div id="v-chat" class="view">
            <header style="padding-top:50px;">
                <b onclick="closeChat()" style="cursor:pointer; font-size:22px;">❮</b>
                <div style="flex:1; display:flex; align-items:center; gap:12px; margin-left:10px;">
                    <div id="c-av" class="av" style="width:40px; height:40px;"></div>
                    <h4 id="c-n">Nama</h4>
                </div>
                <span onclick="alert('Conecta Calling...')" style="font-size:26px; cursor:pointer;">📞</span>
            </header>
            <div id="m-area" class="m-area"></div>
            <div style="padding:15px 20px 40px; display:flex; gap:12px; background:rgba(0,0,0,0.8); backdrop-filter:blur(20px);">
                <input id="m-in" type="text" placeholder="Pesan..." style="flex:1; background:#1c1c1e; border:none; padding:15px; border-radius:25px; outline:none; border:1px solid rgba(255,255,255,0.05);">
                <button onclick="sendMsg()" style="background:var(--p); width:50px; height:50px; border-radius:50%; border:none; cursor:pointer;">➤</button>
            </div>
        </div>

        <div id="v-prof" class="view up">
            <header>
                <b onclick="closeProf()" style="color:var(--p); cursor:pointer; font-size:18px;">Selesai</b>
                <h3>Profil</h3>
                <span></span>
            </header>
            <div style="padding:25px; text-align:center;">
                <div id="p-av-box" class="av" style="width:110px; height:110px; margin:0 auto 20px;"></div>
                
                <label style="font-size:12px; opacity:0.5; display:block; margin-bottom:5px;">NAMA ANDA</label>
                <input id="p-name-in" type="text" style="background:none; border:none; border-bottom:1px solid #333; width:80%; text-align:center; font-size:24px; margin-bottom:20px; outline:none; font-weight:bold;">
                
                <label style="font-size:12px; opacity:0.5; display:block; margin-bottom:5px;">ID LINKUP (NOMOR)</label>
                <div class="id-badge">
                    <span id="p-id-txt">LNK-0000</span>
                    <div class="copy-btn" onclick="copyMyId()">Salin</div>
                </div>

                <div id="qr-profile" style="background:#fff; padding:12px; border-radius:20px; display:inline-block; margin:20px 0;"></div>
                
                <label style="font-size:12px; opacity:0.5; display:block; margin-bottom:10px;">PILIH AVATAR</label>
                <div class="av-grid" id="avatar-choices"></div>
            </div>
        </div>

        <div id="v-scan" class="view">
            <header><b onclick="closeScanner()" style="color:var(--r); cursor:pointer;">Batal</b><h3>Scan QR</h3><span></span></header>
            <div id="cam-box" style="width:100%; height:60vh; background:#111;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const conf = { apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc", databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "xbook-global26" };
        const app = initializeApp(conf); const db = getDatabase(app);

        let myId = localStorage.getItem('lu_v27_id') || ("LNK-"+Math.floor(1000+Math.random()*9000));
        localStorage.setItem('lu_v27_id', myId);
        let myName = localStorage.getItem('lu_v27_n') || "User " + myId;
        let myAv = localStorage.getItem('lu_v27_a') || "https://api.dicebear.com/7.x/avataaars/svg?seed=Zidan";
        let curT = null; let scanner = null;

        setTimeout(() => document.getElementById('boot').style.transform = 'translateY(-100%)', 1500);

        function sync() {
            set(ref(db, `users/${myId}`), { id: myId, name: myName, avatar: myAv });
            document.getElementById('my-av').innerHTML = document.getElementById('p-av-box').innerHTML = `<img src="${myAv}">`;
            document.getElementById('p-name-in').value = myName;
            document.getElementById('p-id-txt').innerText = myId;
            document.getElementById('qr-profile').innerHTML = "";
            new QRCode(document.getElementById('qr-profile'), { text: myId, width: 140, height: 140 });

            const choices = ['Zidan','Asep','Rendi','Berliana','Rifqi'];
            const grid = document.getElementById('avatar-choices'); grid.innerHTML = "";
            choices.forEach(c => {
                const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${c}`;
                const div = document.createElement('div'); div.className = `av-opt ${myAv === url ? 'active' : ''}`;
                div.innerHTML = `<img src="${url}">`;
                div.onclick = () => { myAv = url; localStorage.setItem('lu_v27_a', url); sync(); };
                grid.appendChild(div);
            });
        }
        sync();

        // SALIN ID
        window.copyMyId = () => {
            navigator.clipboard.writeText(myId);
            alert("ID Berhasil Disalin!");
        };

        // AUTO-INBOX & CHAT LIST
        onValue(ref(db, 'msgs'), (snap) => {
            const allChats = snap.val() || {};
            const chatList = document.getElementById('chat-l');
            chatList.innerHTML = "";
            Object.keys(allChats).forEach(key => {
                if(key.includes(myId)) {
                    const pid = key.replace(myId, "").replace("_", "");
                    onValue(ref(db, `users/${pid}`), (u) => {
                        const d = u.val(); if(!d) return;
                        const exist = document.getElementById('ch-'+d.id); if(exist) exist.remove();
                        const last = Object.values(allChats[key]).pop();
                        const card = document.createElement('div'); card.className = 'card'; card.id = 'ch-'+d.id;
                        card.innerHTML = `<div class="av"><img src="${d.avatar}"></div><div style="flex:1"><b>${d.name}</b><br><small style="opacity:0.5">${last.m}</small></div>`;
                        card.onclick = () => openChat(d);
                        chatList.prepend(card);
                        if(last.s !== myId && !last.r && (!curT || curT.id !== d.id)) showNotif(d, last.m);
                    });
                }
            });
        });

        function showNotif(user, msg) {
            const b = document.getElementById('top-notif');
            document.getElementById('nt-av').innerHTML = `<img src="${user.avatar}">`;
            document.getElementById('nt-name').innerText = user.name;
            document.getElementById('nt-msg').innerText = msg;
            b.classList.add('show');
            setTimeout(() => b.classList.remove('show'), 3500);
        }

        window.openChat = (u) => {
            curT = u; document.getElementById('v-chat').classList.add('open');
            document.getElementById('c-n').innerText = u.name;
            document.getElementById('c-av').innerHTML = `<img src="${u.avatar}">`;
            const cid = [myId, u.id].sort().join('_');
            onValue(ref(db, 'msgs/'+cid), (snap) => {
                const a = document.getElementById('m-area'); a.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const div = document.createElement('div'); div.className = `bubble ${d.s===myId?'b-me':'b-them'}`;
                    const dots = d.s===myId ? `<div style="font-size:8px; margin-top:5px; text-align:right;">${d.r?'●●':'●'}</div>` : '';
                    div.innerHTML = `${d.m}${dots}`;
                    a.appendChild(div);
                    if(d.s!==myId && !d.r) update(ref(db, `msgs/${cid}/${m.key}`), { r: true });
                });
                a.scrollTop = a.scrollHeight;
            });
        };

        window.sendMsg = () => {
            const v = document.getElementById('m-in').value; if(!v || !curT) return;
            push(ref(db, 'msgs/'+[myId, curT.id].sort().join('_')), { s:myId, m:v, t:Date.now(), r:false });
            document.getElementById('m-in').value = "";
        };

        // KONTAK
        onValue(ref(db, `users/${myId}/friends`), (snap) => {
            const l = document.getElementById('cont-l'); l.innerHTML = "";
            snap.forEach(f => {
                onValue(ref(db, `users/${f.key}`), (u) => {
                    const d = u.val(); if(!d) return;
                    const card = document.createElement('div'); card.className = 'card';
                    card.innerHTML = `<div class="av"><img src="${d.avatar}"></div><div style="flex:1"><b>${d.name}</b><br><small>${d.id}</small></div><div onclick="delF('${d.id}', event)" style="color:var(--r); padding:10px;">🗑️</div>`;
                    card.onclick = () => openChat(d);
                    l.appendChild(card);
                });
            });
        });

        window.delF = (id, e) => { e.stopPropagation(); if(confirm('Hapus?')) remove(ref(db, `users/${myId}/friends/${id}`)); };
        window.nav = (p, t, el) => {
            document.querySelectorAll('.page').forEach(x => x.style.display='none');
            document.getElementById('p-'+p).style.display='block';
            document.getElementById('h-title').innerText=t;
            document.querySelectorAll('nav div').forEach(x => x.style.opacity='0.3');
            el.style.opacity='1';
        };
        window.closeChat = () => { curT = null; document.getElementById('v-chat').classList.remove('open'); };
        window.openProf = () => document.getElementById('v-prof').classList.add('open');
        window.closeProf = () => { myName = document.getElementById('p-name-in').value; sync(); document.getElementById('v-prof').classList.remove('open'); };
        window.openScanner = () => {
            document.getElementById('v-scan').classList.add('open');
            scanner = new Html5Qrcode("cam-box");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                set(ref(db, `users/${myId}/friends/${txt}`), true);
                closeScanner();
            });
        };
        window.closeScanner = () => { if(scanner) scanner.stop(); document.getElementById('v-scan').classList.remove('open'); };
        window.addManual = () => { const id = prompt("ID Nomor:"); if(id) set(ref(db, `users/${myId}/friends/${id}`), true); };
    </script>
</body>
</html>
