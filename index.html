<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LinkUp v19 | Omni-Fluid</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p: #5856D6; --bg: #000; --glass: rgba(255, 255, 255, 0.1); --blur: blur(35px); --r: #FF3B30; --g: #4CD964; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* AUTO ADJUST DEVICE (TV, TABLET, PHONE) */
        .shell { width: 100%; max-width: 430px; height: 100%; position: relative; display: flex; flex-direction: column; background: radial-gradient(circle at top, #2c2c2e, #000); overflow: hidden; transition: 0.5s; }
        @media (min-width: 1024px) { .shell { max-width: 90%; height: 90vh; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); } }

        /* BOOTING */
        #boot { position: fixed; inset: 0; background: #fff; z-index: 100000; display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        #boot h1 { color: #000; font-size: clamp(30px, 10vw, 50px); font-weight: 900; }

        header { padding: clamp(40px, 8vh, 60px) 25px 15px; background: rgba(0,0,0,0.4); backdrop-filter: var(--blur); display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 0.5px solid rgba(255,255,255,0.1); }

        /* STORY */
        .story-bar { display: flex; gap: 15px; padding: 15px 20px; overflow-x: auto; scrollbar-width: none; background: rgba(255,255,255,0.03); }
        .s-ring { width: 65px; height: 65px; border-radius: 50%; border: 2.5px solid var(--p); padding: 3px; }

        /* CHAT & CARDS */
        .main { flex: 1; overflow-y: auto; padding: 10px 20px 150px; }
        .card { background: var(--glass); backdrop-filter: var(--blur); border-radius: 22px; padding: 18px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); cursor: pointer; }
        .av { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--p); background: #111; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
        .av img { width: 100%; height: 100%; object-fit: cover; }

        /* NAV */
        .nav-b { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 900; }
        nav { width: 92%; max-width: 400px; background: rgba(255,255,255,0.1); backdrop-filter: var(--blur); border-radius: 35px; padding: 15px; display: flex; justify-content: space-around; border: 1px solid rgba(255,255,255,0.1); }

        /* CHAT ENGINE UI */
        .view { position: fixed; inset: 0; background: #000; z-index: 2000; transform: translateX(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); display: flex; flex-direction: column; }
        .view.open { transform: translateX(0); }
        .m-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: rgba(255,255,255,0.02); }
        .bubble { padding: 12px 16px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .b-me { align-self: flex-end; background: var(--p); border-bottom-right-radius: 4px; }
        .b-them { align-self: flex-start; background: #262629; border-bottom-left-radius: 4px; }

        /* VOICE CALL UI (CONECTA) */
        #call-ui { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 100px 0; }
        .call-av { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--p); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(88, 86, 214, 0.4); } 70% { box-shadow: 0 0 0 30px rgba(88, 86, 214, 0); } 100% { box-shadow: 0 0 0 0 rgba(88, 86, 214, 0); } }

        /* SCANNER */
        #scanner-layer { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        #reader { width: 100% !important; height: 70% !important; }
    </style>
</head>
<body>

    <div id="boot"><h1>LinkUp</h1></div>

    <div class="shell">
        <header>
            <h1>Chats</h1>
            <div style="display:flex; gap:20px; align-items:center;">
                <span onclick="startScanner()" style="font-size:26px;">📷</span>
                <div id="my-av" onclick="openProfile()" class="av" style="width:42px; height:42px; cursor:pointer;"></div>
            </div>
        </header>

        <div class="story-bar">
            <div onclick="postStory()" style="flex-shrink:0; text-align:center; width:70px;">
                <div class="s-ring" style="border-style:dashed; border-color:#444;">➕</div>
                <span style="font-size:10px; opacity:0.5;">Cerita</span>
            </div>
            <div id="story-list" style="display:flex; gap:15px;"></div>
        </div>

        <div class="main">
            <div id="p-chats" class="page active"><div id="chat-l"></div></div>
            <div id="p-contacts" class="page" style="display:none;"><div id="cont-l"></div></div>
        </div>

        <div class="nav-b">
            <nav>
                <div class="n-i" onclick="nav('chats',this)" style="opacity:1">💬</div>
                <div class="n-i" onclick="nav('contacts',this)" style="opacity:0.3">👥</div>
            </nav>
        </div>

        <div id="v-chat" class="view">
            <header style="background:#000; padding-top:50px;">
                <b onclick="closeChat()" style="font-size:24px;">❮</b>
                <div style="flex:1; display:flex; align-items:center; gap:12px; margin-left:15px;">
                    <div id="c-av" class="av" style="width:40px; height:40px;"></div>
                    <h4 id="c-n"></h4>
                </div>
                <span onclick="startVoiceCall()" style="font-size:26px;">📞</span>
            </header>
            <div id="m-area" class="m-area"></div>
            <div style="padding:15px 20px 40px; background:#000; display:flex; gap:12px; align-items:center;">
                <input id="m-in" type="text" placeholder="Ketik pesan..." style="flex:1; background:#1a1a1a; border:none; padding:15px; border-radius:25px; outline:none;">
                <button onclick="sendMsg()" style="background:var(--p); width:50px; height:50px; border-radius:50%; border:none;">➤</button>
            </div>
        </div>

        <div id="call-ui">
            <div style="text-align:center">
                <div id="call-av-box" class="call-av" style="margin:0 auto 20px; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:50px; background:#111;"></div>
                <h2 id="call-name">Nama Teman</h2>
                <p style="color:var(--g); margin-top:10px;">Conecta Voice...</p>
            </div>
            <button onclick="endCall()" style="background:var(--r); width:80px; height:80px; border-radius:50%; border:none; font-size:35px;">🏁</button>
        </div>

        <div id="v-prof" class="view" style="transform:translateY(100%)">
            <header style="background:transparent; border:none;">
                <b onclick="closeProfile()">Tutup</b>
                <h3>Profil</h3>
                <span></span>
            </header>
            <div style="padding:20px; text-align:center;">
                <div id="p-av-b" class="av" style="width:100px; height:100px; margin:0 auto 20px; font-size:40px;"></div>
                <h2 id="p-my-id" style="color:var(--p);"></h2>
                <input id="p-name-in" type="text" style="background:none; border:none; border-bottom:1px solid #333; width:80%; text-align:center; padding:10px; font-size:20px; margin:15px 0;">
                <div id="qr-box" style="background:#fff; padding:15px; border-radius:20px; display:inline-block;"></div>
            </div>
        </div>

        <div id="scanner-layer">
            <header><b onclick="stopScanner()">Batal</b><h3>Scan QR</h3><span></span></header>
            <div id="reader"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const conf = { apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc", databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "xbook-global26" };
        const app = initializeApp(conf); const db = getDatabase(app);

        let myId = localStorage.getItem('lu_id_v19') || ("LNK-"+Math.floor(1000+Math.random()*9000));
        localStorage.setItem('lu_id_v19', myId);
        let myName = localStorage.getItem('lu_n19') || "User " + myId;
        let myAv = localStorage.getItem('lu_a19') || "👤";
        let curT = null;
        const peer = new Peer(myId);

        setTimeout(() => document.getElementById('boot').style.display = 'none', 2000);

        function sync() {
            set(ref(db, `users/${myId}`), { id: myId, name: myName, avatar: myAv });
            const els = [document.getElementById('my-av'), document.getElementById('p-av-b')];
            els.forEach(el => {
                if(myAv.startsWith('http')) el.innerHTML = `<img src="${myAv}">`;
                else el.innerHTML = myAv;
            });
            document.getElementById('p-my-id').innerText = myId;
            document.getElementById('qr-box').innerHTML = "";
            new QRCode(document.getElementById('qr-box'), { text: myId, width: 150, height: 150 });
        }
        sync();

        // CHAT SYSTEM (FIXED)
        window.openChat = (u) => {
            curT = u; 
            document.getElementById('v-chat').classList.add('open');
            document.getElementById('c-n').innerText = u.name;
            const cAv = document.getElementById('c-av');
            if(u.avatar.startsWith('http')) cAv.innerHTML = `<img src="${u.avatar}">`; else cAv.innerHTML = u.avatar;

            const chatID = [myId, u.id].sort().join('_');
            onValue(ref(db, 'messages/' + chatID), (snap) => {
                const area = document.getElementById('m-area'); area.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const div = document.createElement('div');
                    div.className = `bubble ${d.sender === myId ? 'b-me' : 'b-them'}`;
                    div.innerText = d.text;
                    area.appendChild(div);
                });
                area.scrollTop = area.scrollHeight;
            });
        };

        window.sendMsg = () => {
            const txt = document.getElementById('m-in').value;
            if(txt && curT) {
                const chatID = [myId, curT.id].sort().join('_');
                push(ref(db, 'messages/' + chatID), { sender: myId, text: txt, time: Date.now() });
                document.getElementById('m-in').value = "";
            }
        };

        // VOICE CALL (VOICE ONLY)
        window.startVoiceCall = async () => {
            document.getElementById('call-ui').style.display = 'flex';
            document.getElementById('call-name').innerText = curT.name;
            const callAv = document.getElementById('call-av-box');
            if(curT.avatar.startsWith('http')) callAv.innerHTML = `<img src="${curT.avatar}" style="width:100%;height:100%">`; else callAv.innerHTML = curT.avatar;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                peer.call(curT.id, stream);
            } catch (e) { alert("Mic ditolak!"); }
        };

        window.endCall = () => { document.getElementById('call-ui').style.display = 'none'; };

        // NAVIGATION
        window.nav = (p, el) => {
            document.querySelectorAll('.page').forEach(x => x.style.display = 'none');
            document.getElementById('p-'+p).style.display = 'block';
            document.querySelectorAll('.n-i').forEach(x => x.style.opacity = '0.3');
            el.style.opacity = '1';
        };

        // QR SCANNER
        let scanner = null;
        window.startScanner = () => {
            document.getElementById('scanner-layer').style.display = 'flex';
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                set(ref(db, `users/${myId}/friends/${txt}`), { id: txt });
                stopScanner();
                alert("Kontak ditambahkan!");
            });
        };
        window.stopScanner = () => { if(scanner) scanner.stop(); document.getElementById('scanner-layer').style.display = 'none'; };

        // FRIENDS LIST
        onValue(ref(db, `users/${myId}/friends`), (snap) => {
            const list = document.getElementById('chat-l'); list.innerHTML = "";
            snap.forEach(f => {
                onValue(ref(db, `users/${f.val().id}`), (u) => {
                    const d = u.val(); if(!d) return;
                    const card = document.createElement('div'); card.className = 'card';
                    card.innerHTML = `<div class="av"></div><div style="flex:1"><b>${d.name}</b><br><small>${d.id}</small></div>`;
                    const av = card.querySelector('.av');
                    if(d.avatar.startsWith('http')) av.innerHTML = `<img src="${d.avatar}">`; else av.innerHTML = d.avatar;
                    card.onclick = () => openChat(d);
                    list.appendChild(card);
                });
            });
        });

        window.closeChat = () => document.getElementById('v-chat').classList.remove('open');
        window.openProfile = () => document.getElementById('v-prof').style.transform = 'translateY(0)';
        window.closeProfile = () => { myName = document.getElementById('p-name-in').value; sync(); document.getElementById('v-prof').style.transform = 'translateY(100%)'; };
    </script>
</body>
</html>
