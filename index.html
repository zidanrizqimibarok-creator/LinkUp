<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LinkUp v38 | PT CONECTA INDONESIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p: #007AFF; --r: #FF3B30; --g: #34C759; --bg: #000; --glass: rgba(28, 28, 30, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', -apple-system, sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        
        /* THEME BARU: NEON GLASS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 110000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(20px); }
        .modal-box { background: #1c1c1e; width: 100%; max-width: 320px; padding: 30px; border-radius: 30px; border: 1px solid var(--p); text-align: center; box-shadow: 0 0 20px rgba(0,122,255,0.2); }
        input { background: #000; border: 1px solid #333; padding: 15px; border-radius: 15px; width: 100%; margin: 10px 0; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--p); box-shadow: 0 0 10px var(--p); }
        button { background: var(--p); border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-r { background: var(--r); }
        .btn-sec { background: #333; }

        /* BOOTING SCREEN */
        #boot { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: 0.8s ease-in-out; }
        .logo-box { width: 90px; height: 90px; background: linear-gradient(45deg, var(--p), #5856D6); border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; box-shadow: 0 0 40px var(--p); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px var(--p); } 50% { transform: scale(1.05); box-shadow: 0 0 50px var(--p); } 100% { transform: scale(1); box-shadow: 0 0 20px var(--p); } }

        .shell { width: 100%; max-width: 430px; height: 100%; position: relative; display: flex; flex-direction: column; background: radial-gradient(circle at top, #1c1c1e, #000); }
        header { padding: 60px 25px 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(30px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 0.5px solid #333; }
        
        .main { flex: 1; overflow-y: auto; padding: 15px 20px 130px; }
        .card { background: var(--glass); border-radius: 22px; padding: 18px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .card:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
        .av { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--p); overflow: hidden; flex-shrink: 0; background: #111; }
        .av img { width: 100%; height: 100%; object-fit: cover; }

        .view { position: fixed; inset: 0; background: #000; z-index: 5000; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .view.open { transform: translateX(0); }
        .view.up { transform: translateY(100%); transition: 0.4s; }
        .view.up.open { transform: translateY(0); }

        .m-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #000; }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 15px; position: relative; line-height: 1.4; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .b-me { align-self: flex-end; background: var(--p); border-bottom-right-radius: 4px; }
        .b-them { align-self: flex-start; background: #2c2c2e; border-bottom-left-radius: 4px; }

        .nav-b { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 2000; }
        nav { width: 90%; background: rgba(30,30,30,0.8); backdrop-filter: blur(20px); border-radius: 35px; padding: 20px; display: flex; justify-content: space-around; border: 1px solid #444; }
        
        .av-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .av-opt { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid transparent; overflow: hidden; }
        .av-opt.active { border-color: var(--p); }

        /* MSG OPTIONS SHEET */
        #msg-sheet { position: fixed; bottom: -300px; left: 0; width: 100%; background: #1c1c1e; border-radius: 30px 30px 0 0; padding: 25px; z-index: 6000; transition: 0.3s; border-top: 1px solid #333; }
        #msg-sheet.open { bottom: 0; }
        .sheet-btn { padding: 18px; text-align: center; border-bottom: 0.5px solid #333; font-weight: 600; font-size: 17px; }
    </style>
</head>
<body>

    <div id="m-welcome" class="modal">
        <div class="modal-box">
            <div class="logo-box" style="margin: 0 auto 20px;">L</div>
            <h3>Daftar LinkUp</h3>
            <p style="font-size: 12px; opacity: 0.5; margin-bottom: 10px;">By PT CONECTA INDONESIA</p>
            <input type="text" id="in-myname" placeholder="Nama Kamu...">
            <button onclick="saveProfile()">Masuk</button>
        </div>
    </div>

    <div id="m-save" class="modal">
        <div class="modal-box">
            <h3>Simpan Teman</h3>
            <input type="text" id="in-save-id" placeholder="ID (LNK-XXXX)">
            <input type="text" id="in-save-name" placeholder="Nama Panggilan...">
            <button onclick="confirmSaveContact()">Simpan Kontak</button>
            <button class="btn-sec" onclick="closeModal('m-save')">Batal</button>
        </div>
    </div>

    <div id="m-edit-prof" class="modal">
        <div class="modal-box">
            <h3>Edit Nama</h3>
            <input type="text" id="in-edit-name" placeholder="Nama Baru...">
            <button onclick="updateMyName()">Simpan Perubahan</button>
            <button class="btn-sec" onclick="closeModal('m-edit-prof')">Batal</button>
        </div>
    </div>

    <div id="boot">
        <div class="logo-box">L</div>
        <h2 style="margin-top:25px; letter-spacing: 2px;">LINKUP</h2>
        <p style="margin-top:10px; opacity:0.4; font-size:10px; font-weight:bold;">BY PT CONECTA INDONESIA</p>
    </div>

    <div id="msg-sheet">
        <div class="sheet-btn" style="color:var(--r)" onclick="deleteMsg('all')">Hapus untuk Semua</div>
        <div class="sheet-btn" onclick="deleteMsg('me')">Hapus untuk Saya</div>
        <div class="sheet-btn" style="border:none; opacity:0.5;" onclick="closeSheet()">Batal</div>
    </div>

    <audio id="ring-sound" src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Iphone+Ringtone&filename=mt/mtkzntu0ote1otuzndm0_M7_2fW_2fL2_2bq6_2bs.mp3" loop></audio>

    <div class="shell">
        <header>
            <h1 id="h-title" style="font-size: 28px; font-weight: 800;">Chats</h1>
            <div style="display:flex; gap:20px; align-items:center;">
                <span onclick="openView('v-scan')" style="font-size:24px;">📷</span>
                <div id="my-av" onclick="openView('v-prof')" class="av" style="width:42px; height:42px; cursor:pointer;"></div>
            </div>
        </header>

        <div class="main">
            <div id="p-chats" class="page"><div id="chat-l"></div></div>
            <div id="p-cont" class="page" style="display:none;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:20px;">
                    <button onclick="openModal('m-save')" style="background:#2c2c2e;">➕ Tambah ID</button>
                    <button onclick="alert('Fitur Grup Segera Hadir di v39!')" style="background:#2c2c2e;">👥 Buat Grup</button>
                </div>
                <div id="cont-l"></div>
            </div>
        </div>

        <div class="nav-b">
            <nav>
                <div onclick="nav('chats','Chats',this)" style="font-size:26px;">💬</div>
                <div onclick="nav('cont','Kontak',this)" style="opacity:0.4; font-size:26px;">👥</div>
            </nav>
        </div>

        <div id="v-chat" class="view">
            <header style="padding-top:60px;">
                <b onclick="closeChat()" style="font-size:22px;">❮</b>
                <div style="flex:1; display:flex; align-items:center; gap:12px; margin-left:15px;">
                    <div id="c-av" class="av" style="width:42px; height:42px;"></div>
                    <div><h4 id="c-n" style="font-size:16px;">Nama</h4><small id="c-st" style="color:var(--g); font-size:11px;"></small></div>
                </div>
                <span onclick="alert('Memanggil...')" style="font-size:22px;">📞</span>
            </header>
            <div id="m-area" class="m-area"></div>
            <div style="padding:15px 20px 45px; display:flex; gap:12px; background:#1c1c1e;">
                <input id="m-in" type="text" placeholder="Ketik pesan..." style="flex:1; margin:0; background:#000;">
                <button onclick="sendMsg()" style="width:55px; height:55px; border-radius:50%; margin:0; padding:0; display:flex; align-items:center; justify-content:center; font-size:20px;">➤</button>
            </div>
        </div>

        <div id="v-prof" class="view up">
            <header><b onclick="closeView('v-prof')" style="color:var(--p);">Selesai</b><h3>Profil</h3><span></span></header>
            <div style="padding:30px; text-align:center;">
                <div id="p-av-box" class="av" style="width:110px; height:110px; margin:0 auto 20px; border-width:3px;"></div>
                <h2 id="p-name-txt" onclick="openModal('m-edit-prof')" style="cursor:pointer;">User ✏️</h2>
                <p id="p-id-txt" style="opacity:0.5; font-family:monospace; margin:10px 0 25px;"></p>
                <div id="qr-profile" style="background:#fff; padding:15px; border-radius:20px; display:inline-block; margin-bottom:25px;"></div>
                <div class="av-grid" id="avatar-choices"></div>
                <button onclick="copyId()" style="margin-top:30px; letter-spacing:1px;">SALIN ID NOMOR</button>
                <button class="btn-r" onclick="resetSemua()" style="margin-top:10px;">KELUAR AKUN</button>
            </div>
        </div>
        
        <div id="v-scan" class="view"><header><b onclick="closeView('v-scan')" style="color:var(--r);">Batal</b><h3>Scan ID</h3><span></span></header><div id="cam-box" style="width:100%; height:70vh; background:#000;"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const conf = { apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc", databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "xbook-global26" };
        const app = initializeApp(conf); const db = getDatabase(app);

        let myId = localStorage.getItem('lu_v38_id');
        let myName = localStorage.getItem('lu_v38_n');
        let myAv = localStorage.getItem('lu_v38_a') || `https://api.dicebear.com/7.x/avataaars/svg?seed=Conecta`;
        let curT = null; let selMsg = null;

        window.onload = () => {
            if(!myId) { document.getElementById('m-welcome').style.display='flex'; document.getElementById('boot').style.display='none'; }
            else { init(); }
        };

        window.saveProfile = () => {
            const n = document.getElementById('in-myname').value;
            if(!n) return;
            myId = "LNK-" + Math.floor(1000 + Math.random() * 9000);
            myName = n;
            localStorage.setItem('lu_v38_id', myId);
            localStorage.setItem('lu_v38_n', n);
            document.getElementById('m-welcome').style.display='none';
            init();
        };

        window.updateMyName = () => {
            const n = document.getElementById('in-edit-name').value;
            if(!n) return;
            myName = n;
            localStorage.setItem('lu_v38_n', n);
            update(ref(db, `users/${myId}`), { name: n });
            document.getElementById('p-name-txt').innerText = n + " ✏️";
            closeModal('m-edit-prof');
            alert("Nama Berhasil Diganti!");
        };

        function init() {
            set(ref(db, `users/${myId}`), { id: myId, name: myName, avatar: myAv, online: true });
            onDisconnect(ref(db, `users/${myId}`)).update({ online: false });
            
            document.getElementById('my-av').innerHTML = document.getElementById('p-av-box').innerHTML = `<img src="${myAv}">`;
            document.getElementById('p-name-txt').innerText = myName + " ✏️";
            document.getElementById('p-id-txt').innerText = myId;
            document.getElementById('qr-profile').innerHTML = "";
            new QRCode(document.getElementById('qr-profile'), { text: myId, width: 150, height: 150 });

            const grid = document.getElementById('avatar-choices'); grid.innerHTML = "";
            for(let i=1; i<=10; i++){
                const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=User${i}`;
                const div = document.createElement('div'); div.className = `av-opt ${myAv === url ? 'active' : ''}`;
                div.innerHTML = `<img src="${url}" style="width:100%">`;
                div.onclick = () => { myAv = url; localStorage.setItem('lu_v38_a', url); init(); };
                grid.appendChild(div);
            }
            
            loadContacts();
            loadChats();
            setTimeout(() => { document.getElementById('boot').style.opacity='0'; setTimeout(()=>document.getElementById('boot').style.display='none',800); }, 2500);
        }

        window.confirmSaveContact = () => {
            const id = document.getElementById('in-save-id').value;
            const alias = document.getElementById('in-save-name').value;
            if(!id.startsWith('LNK-') || !alias) return alert("Data tidak lengkap!");
            set(ref(db, `users/${myId}/friends/${id}`), { alias: alias });
            closeModal('m-save');
            alert("Kontak Tersimpan!");
        };

        function loadContacts() {
            onValue(ref(db, `users/${myId}/friends`), (snap) => {
                const list = document.getElementById('cont-l'); list.innerHTML = "";
                snap.forEach(f => {
                    get(ref(db, `users/${f.key}`)).then(u => {
                        const d = u.val(); if(!d) return;
                        const name = f.val().alias || d.name;
                        const card = document.createElement('div'); card.className = 'card';
                        card.innerHTML = `<div class="av"><img src="${d.avatar}"></div><div style="flex:1"><b>${name}</b><br><small style="opacity:0.5">${d.id}</small></div><button class="btn-r" style="width:auto; padding:5px 10px; font-size:10px;" onclick="delCont('${d.id}')">Hapus</button>`;
                        card.onclick = (e) => { if(e.target.tagName !== 'BUTTON') openChat({id: d.id, name: name, avatar: d.avatar}); };
                        list.appendChild(card);
                    });
                });
            });
        }

        function loadChats() {
            onValue(ref(db, 'msgs'), snap => {
                const all = snap.val() || {};
                const list = document.getElementById('chat-l');
                Object.keys(all).forEach(k => {
                    if(k.includes(myId)) {
                        const msgs = Object.values(all[k]); const last = msgs[msgs.length-1];
                        const pid = k.replace(myId,"").replace("_","");
                        get(ref(db, `users/${pid}`)).then(u => {
                            const d = u.val(); if(!d) return;
                            get(ref(db, `users/${myId}/friends/${pid}`)).then(f => {
                                const name = (f.val() && f.val().alias) ? f.val().alias : d.name;
                                updateList(k, name, d.avatar, last.m, last.t);
                            });
                        });
                    }
                });
            });
        }

        function updateList(cid, name, av, msg, t) {
            const list = document.getElementById('chat-l');
            let el = document.getElementById('li-'+cid);
            if(!el) { el = document.createElement('div'); el.id = 'li-'+cid; el.className = 'card'; list.prepend(el); }
            el.innerHTML = `<div class="av"><img src="${av}"></div><div style="flex:1"><b>${name}</b><br><small style="opacity:0.6">${msg}</small></div>`;
            el.onclick = () => openChat({id: cid.replace(myId,"").replace("_",""), name, avatar: av});
            el.dataset.t = t;
            [...list.children].sort((a,b)=>b.dataset.t - a.dataset.t).forEach(i=>list.appendChild(i));
        }

        window.openChat = (u) => {
            curT = u; document.getElementById('v-chat').classList.add('open');
            document.getElementById('c-n').innerText = u.name;
            document.getElementById('c-av').innerHTML = `<img src="${u.avatar}">`;
            const cid = [myId, u.id].sort().join('_');
            onValue(ref(db, 'msgs/'+cid), snap => {
                const a = document.getElementById('m-area'); a.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    if(d.del && d.del.includes(myId)) return; // Hapus untuk saya
                    const div = document.createElement('div'); div.className = `bubble ${d.s===myId?'b-me':'b-them'}`;
                    div.innerHTML = d.m;
                    div.onclick = () => openSheet(m.key, cid); // KLIK UNTUK HAPUS
                    a.appendChild(div);
                });
                a.scrollTop = a.scrollHeight;
            });
        };

        window.openSheet = (msgId, cid) => { selMsg = {id: msgId, cid: cid}; document.getElementById('msg-sheet').classList.add('open'); };
        window.closeSheet = () => document.getElementById('msg-sheet').classList.remove('open');
        
        window.deleteMsg = (type) => {
            if(type === 'all') remove(ref(db, `msgs/${selMsg.cid}/${selMsg.id}`));
            else {
                const dRef = ref(db, `msgs/${selMsg.cid}/${selMsg.id}/del`);
                get(dRef).then(s => { let d = s.val() || []; d.push(myId); set(dRef, d); });
            }
            closeSheet();
        };

        window.sendMsg = () => {
            const v = document.getElementById('m-in').value; if(!v || !curT) return;
            push(ref(db, 'msgs/'+[myId, curT.id].sort().join('_')), { s:myId, m:v, t:Date.now() });
            document.getElementById('m-in').value = "";
        };

        window.openModal = (id) => document.getElementById(id).style.display='flex';
        window.closeModal = (id) => document.getElementById(id).style.display='none';
                window.nav = (p, t, el) => { 
            // Sembunyiin semua halaman
            document.querySelectorAll('.page').forEach(x => x.style.display = 'none'); 
            // Tampilan halaman yang dipilih
                        document.getElementById('p-' + p).style.display = 'block'; 
            document.getElementById('h-title').innerText = t; 
            document.querySelectorAll('nav div').forEach(x => x.style.opacity = '0.4'); 
            el.style.opacity = '1'; 
        };

        window.openView = (id) => { 
            if(id === 'v-scan'){ 
                const s = new Html5Qrcode("cam-box"); 
                s.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: 250 }, 
                    (t) => { 
                        document.getElementById('in-save-id').value = t; 
                        s.stop(); 
                        closeView('v-scan'); 
                        openModal('m-save'); 
                    }
                ).catch(err => alert("Kamera Error: " + err));
            }
            document.getElementById(id).classList.add('open'); 
        };

        window.closeView = (id) => {
            document.getElementById(id).classList.remove('open');
        };

        window.closeChat = () => { 
            curT = null; 
            document.getElementById('v-chat').classList.remove('open'); 
        };

        window.copyId = () => { 
            navigator.clipboard.writeText(myId); 
            alert("ID " + myId + " DISALIN!"); 
        };

        window.delCont = (id) => { 
            if(confirm("Hapus kontak ini secara permanen?")) {
                remove(ref(db, `users/${myId}/friends/${id}`)).then(() => {
                    alert("Kontak Terhapus");
                });
            }
        };

        window.resetSemua = () => { 
            if(confirm("Keluar dari akun dan hapus semua data?")) { 
                localStorage.clear(); 
                location.reload(); 
            }
        };

        // Otomatis tutup modal kalau klik di area gelap (Luar box)
        window.onclick = (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = "none";
            }
        };

    </script>
    <div style="position: fixed; bottom: 5px; width: 100%; text-align: center; font-size: 8px; opacity: 0.2; pointer-events: none; color: #fff; z-index: 9999;">
        PRODUCED BY PT CONECTA INDONESIA
    </div>
</body>
</html>
