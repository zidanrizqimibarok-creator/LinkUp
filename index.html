<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LinkUp v18 | Conecta Ultimate</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p: #5856D6; --bg: #000; --glass: rgba(255, 255, 255, 0.1); --blur: blur(35px); --r: #FF3B30; --g: #4CD964; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100dvh; overflow: hidden; }
        
        /* BACKGROUND GRADIENT FLUID */
        .shell { width: 100%; max-width: 430px; height: 100dvh; position: relative; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #2c2c2e, #000); }

        /* BOOTING LinkUp */
        #boot { position: fixed; inset: 0; background: #fff; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s ease-in-out; }
        #boot h1 { color: #000; font-size: 48px; font-weight: 900; }

        /* HEADER */
        header { padding: 55px 25px 15px; background: rgba(0,0,0,0.4); backdrop-filter: var(--blur); display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
        header h1 { font-size: 28px; font-weight: 800; }

        /* UI ELEMENTS */
        .main { flex: 1; overflow-y: auto; padding: 10px 20px 150px; }
        .card { background: var(--glass); backdrop-filter: var(--blur); border-radius: 25px; padding: 18px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .av { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--p); background: #111; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
        .av img { width: 100%; height: 100%; object-fit: cover; }

        /* FLOATING ACTION BUTTON */
        .fab { position: absolute; right: 25px; bottom: 120px; width: 65px; height: 65px; background: var(--p); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 10px 30px rgba(88, 86, 214, 0.4); z-index: 800; transition: 0.3s; }
        .fab:active { transform: scale(0.9); }

        /* NAV BAR */
        .nav-b { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 900; }
        nav { width: 92%; background: rgba(255,255,255,0.1); backdrop-filter: var(--blur); border-radius: 35px; padding: 15px; display: flex; justify-content: space-around; border: 1px solid rgba(255,255,255,0.1); }
        .n-i { font-size: 26px; opacity: 0.3; transition: 0.3s; }
        .n-i.active { opacity: 1; color: #fff; transform: translateY(-3px); }

        /* OVERLAYS (Views) */
        .view { position: fixed; inset: 0; background: #000; z-index: 2000; transform: translateX(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); display: flex; flex-direction: column; }
        .view.open { transform: translateX(0); }

        /* SCANNER CAMERA UI */
        #scanner-layer { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        #reader { width: 100% !important; height: 70% !important; border: none !important; }
        .scan-frame { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

        /* CALL BOOTING CONECTA */
        #call-boot { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        
        /* STORY */
        .story-bar { display: flex; gap: 15px; padding: 15px 20px; overflow-x: auto; scrollbar-width: none; background: rgba(255,255,255,0.03); }
        .s-item { flex-shrink: 0; text-align: center; width: 70px; }
        .s-ring { width: 65px; height: 65px; border-radius: 50%; border: 2.5px solid var(--p); padding: 3px; margin-bottom: 5px; }
        .s-ring.me { border: 2px dashed #444; }
    </style>
</head>
<body>

    <div id="boot"><h1>LinkUp</h1></div>

    <div id="scanner-layer">
        <header style="background:transparent; border:none;">
            <b onclick="stopScanner()" style="font-size:18px; color:var(--r)">BATAL</b>
            <h3 style="margin-right:40px">SCAN LINKUP QR</h3>
            <span></span>
        </header>
        <div id="reader"></div>
        <div class="scan-frame">
            <p style="opacity:0.6; text-align:center;">Arahkan kamera ke QR Code teman untuk otomatis menambah kontak & memulai chat.</p>
        </div>
    </div>

    <div id="call-boot">
        <h1 style="font-size:40px; letter-spacing:-1px;">Conecta</h1>
        <p style="color:var(--p); font-weight:800; margin-top:10px;">SECURE CONNECTION...</p>
    </div>

    <div class="shell">
        <header>
            <h1 id="h-t">Chats</h1>
            <div style="display:flex; gap:20px; align-items:center;">
                <span onclick="startScanner()" style="font-size:26px; cursor:pointer;">📷</span>
                <div id="my-av" onclick="openProfile()" class="av" style="width:42px; height:42px; cursor:pointer;"></div>
            </div>
        </header>

        <div class="story-bar">
            <div class="s-item" onclick="postStory()">
                <div class="s-ring me"><div class="av" style="width:100%; height:100%; border:none;">➕</div></div>
                <span style="font-size:10px; opacity:0.6;">Cerita Saya</span>
            </div>
            <div id="story-list" style="display:flex; gap:15px;"></div>
        </div>

        <div class="main">
            <div id="p-chats" class="page active"><div id="chat-l"></div></div>
            <div id="p-contacts" class="page"><div id="cont-l"></div></div>
        </div>

        <div id="fab-add" class="fab" onclick="openAddModal()">＋</div>

        <nav class="nav-b">
            <nav>
                <div class="n-i active" onclick="nav('chats','Chats',this)">💬</div>
                <div class="n-i" onclick="nav('contacts','Kontak',this)">👥</div>
            </nav>
        </nav>

        <div id="v-add" class="view" style="background:rgba(0,0,0,0.9); backdrop-filter:blur(20px);">
            <div style="padding:80px 30px; text-align:center;">
                <h2>Tambah Kontak</h2>
                <input id="s-id" type="text" placeholder="Masukkan LinkUp Number" style="width:100%; background:#222; border:none; padding:18px; border-radius:20px; color:#fff; margin:30px 0; text-align:center; font-size:20px;">
                <div style="display:flex; gap:15px;">
                    <button onclick="closeAddModal()" style="flex:1; background:#333; padding:15px; border-radius:15px; border:none;">Batal</button>
                    <button onclick="addFriend()" style="flex:1; background:var(--p); padding:15px; border-radius:15px; border:none; font-weight:800;">Simpan</button>
                </div>
            </div>
        </div>

        <div id="v-prof" class="view" style="transform:translateY(100%)">
            <header style="background:transparent; border:none;">
                <b onclick="closeProfile()">Selesai</b>
                <h3>LinkUp Number</h3>
                <span></span>
            </header>
            <div style="padding:20px; text-align:center;">
                <div id="p-av-b" class="av" style="width:110px; height:110px; margin:0 auto 20px; font-size:45px;"></div>
                <h2 id="p-my-id" onclick="copyID()" style="color:var(--p); letter-spacing:1px;"></h2>
                <input id="p-name-in" type="text" style="background:none; border:none; border-bottom:1px solid #333; width:80%; text-align:center; padding:10px; font-size:22px; font-weight:700; margin:15px 0;">
                
                <p style="font-size:12px; opacity:0.5; margin-top:20px;">QR CODE KAMU</p>
                <div id="qr-box" style="background:#fff; padding:15px; border-radius:20px; display:inline-block; margin-top:10px;"></div>
                
                <div id="av-grid" style="display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-top:30px;"></div>
            </div>
        </div>

        <div id="v-chat" class="view">
            <header style="background:rgba(0,0,0,0.8)">
                <b onclick="closeChat()" style="font-size:24px;">❮</b>
                <div style="flex:1; display:flex; align-items:center; gap:12px; margin-left:15px;">
                    <div id="c-av" class="av" style="width:40px; height:40px;"></div>
                    <div><h4 id="c-n"></h4><small style="color:var(--g)">online</small></div>
                </div>
                <span onclick="startCall()" style="font-size:26px;">🎥</span>
            </header>
            <div id="m-area" class="main" style="padding-bottom:20px; display:flex; flex-direction:column; gap:10px;"></div>
            <div style="padding:15px 20px 40px; background:#000; display:flex; gap:12px; align-items:center; border-top:0.5px solid #222;">
                <input id="m-in" type="text" placeholder="Ketik pesan..." style="flex:1; background:#1a1a1a; border:none; padding:15px; border-radius:25px; outline:none;">
                <button onclick="sendMsg()" style="background:var(--p); width:50px; height:50px; border-radius:50%; border:none;">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const conf = { apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc", databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "xbook-global26" };
        const app = initializeApp(conf); const db = getDatabase(app);

        let myId = localStorage.getItem('lu_id_v18') || ("LNK-"+Math.floor(1000+Math.random()*9000));
        localStorage.setItem('lu_id_v18', myId);
        let myName = localStorage.getItem('lu_n18') || "User " + myId;
        let myAv = localStorage.getItem('lu_a18') || "👤";
        const peer = new Peer(myId);
        let scanner = null, curT = null;

        setTimeout(() => document.getElementById('boot').style.transform = 'translateY(-100%)', 1800);

        function sync() {
            set(ref(db, `users/${myId}`), { id: myId, name: myName, avatar: myAv });
            const myAvEls = [document.getElementById('my-av'), document.getElementById('p-av-b')];
            myAvEls.forEach(el => {
                if(myAv.startsWith('http')) el.innerHTML = `<img src="${myAv}">`;
                else el.innerHTML = myAv;
            });
            document.getElementById('p-my-id').innerText = myId;
            document.getElementById('p-name-in').value = myName;
            
            // Generate QR Code Pribadi
            document.getElementById('qr-box').innerHTML = "";
            new QRCode(document.getElementById('qr-box'), { text: myId, width: 150, height: 150, colorDark: "#000", colorLight: "#fff" });
            
            // Grid Avatar
            const grid = document.getElementById('av-grid'); grid.innerHTML = "";
            ['https://api.dicebear.com/7.x/avataaars/svg?seed=Zidan', 'https://api.dicebear.com/7.x/avataaars/svg?seed=Conecta', '🔥','💀','👑','👻','🦊'].forEach(o => {
                const d = document.createElement('div'); d.className = 'av'; d.style.width='45px'; d.style.height='45px';
                if(o.startsWith('http')) d.innerHTML = `<img src="${o}">`; else d.innerHTML = o;
                d.onclick = () => { myAv = o; localStorage.setItem('lu_a18', o); sync(); };
                grid.appendChild(d);
            });
        }
        sync();

        // --- KAMERA QR SCANNER ---
        window.startScanner = () => {
            document.getElementById('scanner-layer').style.display = 'flex';
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (decodedText) => {
                document.getElementById('s-id').value = decodedText;
                stopScanner();
                addFriend(); // Langsung tambah & chat
            }).catch(err => alert("Kamera Error: " + err));
        };
        window.stopScanner = () => { if(scanner) scanner.stop(); document.getElementById('scanner-layer').style.display = 'none'; };

        // --- TAMBAH KONTAK & AUTO CHAT ---
        window.addFriend = () => {
            const tid = document.getElementById('s-id').value.trim().toUpperCase();
            if(tid && tid !== myId) {
                set(ref(db, `users/${myId}/friends/${tid}`), { id: tid });
                closeAddModal();
                onValue(ref(db, `users/${tid}`), (s) => { if(s.exists()) openChat(s.val()); }, {onlyOnce:true});
            }
        };

        // --- RE-IMPLEMENTASI FITUR STORY (TEKS) ---
        window.postStory = () => {
            const txt = prompt("Tulis cerita singkat kamu:");
            if(txt) set(ref(db, `stories/${myId}`), { id: myId, name: myName, avatar: myAv, text: txt, time: serverTimestamp() });
        };

        onValue(ref(db, 'stories'), (snap) => {
            const list = document.getElementById('story-list'); list.innerHTML = "";
            snap.forEach(s => {
                const d = s.val(); if(d.id === myId) return;
                const item = document.createElement('div'); item.className = 's-item';
                item.innerHTML = `<div class="s-ring"><div class="av" style="width:100%; height:100%; border:none;"></div></div><span>${d.name}</span>`;
                const avEl = item.querySelector('.av');
                if(d.avatar.startsWith('http')) avEl.innerHTML = `<img src="${d.avatar}">`; else avEl.innerHTML = d.avatar;
                item.onclick = () => alert(`${d.name} berkata:\n"${d.text}"`);
                list.appendChild(item);
            });
        });

        // --- LIST KONTAK & CHAT ---
        onValue(ref(db, `users/${myId}/friends`), (s) => {
            const ch = document.getElementById('chat-l'), cl = document.getElementById('cont-l');
            ch.innerHTML = ""; cl.innerHTML = "";
            s.forEach(c => {
                onValue(ref(db, `users/${c.val().id}`), (u) => {
                    const d = u.val(); if(!d) return;
                    const cardHtml = `<div class="av"></div><div style="flex:1"><b>${d.name}</b><br><small style="opacity:0.5">${d.id}</small></div>`;
                    const div = document.createElement('div'); div.className = 'card'; div.innerHTML = cardHtml;
                    const avEl = div.querySelector('.av');
                    if(d.avatar.startsWith('http')) avEl.innerHTML = `<img src="${d.avatar}">`; else avEl.innerHTML = d.avatar;
                    
                    const divChat = div.cloneNode(true); divChat.onclick = () => openChat(d);
                    const divCont = div.cloneNode(true); divCont.onclick = () => openChat(d);
                    divCont.innerHTML += `<span onclick="del(event,'${d.id}')" style="color:var(--r); font-size:12px;">HAPUS</span>`;
                    
                    ch.appendChild(divChat); cl.appendChild(divCont);
                });
            });
        });

        window.del = (e, id) => { e.stopPropagation(); if(confirm("Hapus?")) remove(ref(db, `users/${myId}/friends/${id}`)); };

        // --- CALL SYSTEM WITH CONECTA BOOT ---
        window.startCall = () => {
            const cb = document.getElementById('call-boot'); cb.style.display = 'flex';
            setTimeout(() => {
                cb.style.display = 'none';
                alert("Memulai Video Call Conecta ke " + curT.name);
                // Integrasi PeerJS Call di v16 tetap jalan disini
            }, 1500);
        };

        // --- UI UTILS ---
        window.nav = (p, t, el) => {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            document.getElementById('h-t').innerText = t;
            document.querySelectorAll('.n-i').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('fab-add').style.display = (p === 'contacts') ? 'flex' : 'none';
        };
        window.openChat = (u) => { curT = u; document.getElementById('v-chat').classList.add('open'); document.getElementById('c-n').innerText = u.name; };
        window.closeChat = () => document.getElementById('v-chat').classList.remove('open');
        window.openAddModal = () => document.getElementById('v-add').classList.add('open');
        window.closeAddModal = () => document.getElementById('v-add').classList.remove('open');
        window.openProfile = () => document.getElementById('v-prof').style.transform = 'translateY(0)';
        window.closeProfile = () => { myName = document.getElementById('p-name-in').value; sync(); document.getElementById('v-prof').style.transform = 'translateY(100%)'; };
    </script>
</body>
</html>
