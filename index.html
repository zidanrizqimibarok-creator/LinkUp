<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LinkUp v20 | Conecta Elite</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p: #5856D6; --glass: rgba(255, 255, 255, 0.08); --blur: blur(40px); --r: #FF3B30; --g: #4CD964; --y: #FFCC00; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; color: #fff; }
        body { background: #000; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        
        /* RESPONSIVE SHELL */
        .shell { width: 100%; max-width: 430px; height: 100%; position: relative; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #1c1c1e, #000); }
        @media (min-width: 800px) { .shell { max-width: 90%; height: 95vh; margin-top: 2.5vh; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); } }

        /* HEADER */
        header { padding: 55px 25px 15px; background: rgba(0,0,0,0.5); backdrop-filter: var(--blur); display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 0.5px solid rgba(255,255,255,0.1); }

        /* CHAT LIST & CARDS */
        .main { flex: 1; overflow-y: auto; padding: 15px 20px 140px; }
        .card { background: var(--glass); backdrop-filter: var(--blur); border-radius: 24px; padding: 18px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card:active { transform: scale(0.97); }
        .av { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--p); background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 24px; }
        .av img { width: 100%; height: 100%; object-fit: cover; }

        /* BUBBLE CHAT */
        .bubble { padding: 10px 15px; border-radius: 18px; max-width: 75%; position: relative; font-size: 15px; margin-bottom: 2px; }
        .b-me { align-self: flex-end; background: var(--p); border-bottom-right-radius: 4px; }
        .b-them { align-self: flex-start; background: #2c2c2e; border-bottom-left-radius: 4px; }
        .m-info { font-size: 9px; opacity: 0.6; margin-top: 4px; display: flex; justify-content: flex-end; align-items: center; gap: 3px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; border: 1.5px solid #fff; }
        .status-read { background: #fff; } /* Bulat isi 2 = Anggap status read */

        /* TRANSITION LAYERS */
        .trans-layer { position: fixed; inset: 0; z-index: 10000; display: none; align-items: center; justify-content: center; background: #000; color: #fff; font-size: 32px; font-weight: 800; animation: fade 0.5s; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* CALL UI */
        #call-ui { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 100px 0; }
        
        /* FOOTER NAV */
        .nav-b { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; }
        nav { width: 90%; background: rgba(255,255,255,0.1); backdrop-filter: var(--blur); border-radius: 30px; padding: 15px; display: flex; justify-content: space-around; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="trans-linkup" class="trans-layer" style="background:#fff; color:#000;">LinkUp</div>
    <div id="trans-conecta" class="trans-layer">Conecta</div>

    <div class="shell">
        <header>
            <h1 id="h-t">LinkUp</h1>
            <div style="display:flex; gap:18px; align-items:center;">
                <span onclick="startScanner()" style="font-size:24px;">📷</span>
                <div id="my-av" onclick="openProfile()" class="av" style="width:40px; height:40px; cursor:pointer;"></div>
            </div>
        </header>

        <div class="main">
            <div id="p-chats" class="page"><div id="chat-l"></div></div>
            <div id="p-contacts" class="page" style="display:none;"><div id="cont-l"></div></div>
        </div>

        <div class="nav-b">
            <nav>
                <div onclick="nav('chats')">💬</div>
                <div onclick="nav('contacts')">👥</div>
            </nav>
        </div>

        <div id="v-chat" class="view" style="position:fixed; inset:0; background:#000; z-index:2000; transform:translateX(100%); transition:0.4s; display:flex; flex-direction:column;">
            <header style="padding-top:50px;">
                <b onclick="closeChat()">❮</b>
                <div style="flex:1; display:flex; align-items:center; gap:10px; margin-left:10px;">
                    <div id="c-av" class="av" style="width:38px; height:38px;"></div>
                    <div onclick="showContactMenu()"><h4 id="c-n"></h4><small id="c-st" style="color:var(--g)">online</small></div>
                </div>
                <span onclick="callFlow()" style="font-size:24px;">📞</span>
            </header>
            <div id="m-area" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:5px; background:rgba(255,255,255,0.02);"></div>
            <div style="padding:15px 20px 40px; display:flex; gap:10px; align-items:center; background:#000;">
                <input id="m-in" type="text" placeholder="Pesan..." style="flex:1; background:#1c1c1e; border:none; padding:15px; border-radius:25px; outline:none;">
                <button onclick="sendMsg()" style="background:var(--p); width:50px; height:50px; border-radius:50%; border:none;">➤</button>
            </div>
        </div>

        <div id="call-ui">
            <div style="text-align:center">
                <div id="call-av" class="av" style="width:120px; height:120px; margin:0 auto 20px;"></div>
                <h2 id="call-name">Zidan</h2>
                <p>Calling via Conecta...</p>
            </div>
            <button onclick="endCallFlow()" style="background:var(--r); width:75px; height:75px; border-radius:50%; border:none; font-size:30px;">🏁</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const conf = { apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc", databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "xbook-global26" };
        const app = initializeApp(conf); const db = getDatabase(app);

        let myId = localStorage.getItem('lu_id_v20') || ("LNK-"+Math.floor(1000+Math.random()*9000));
        localStorage.setItem('lu_id_v20', myId);
        let myName = localStorage.getItem('lu_n20') || "User " + myId;
        let myAv = localStorage.getItem('lu_a20') || "👤";
        let curT = null;

        // Permintaan Izin Mic & Notif
        window.onload = () => {
            if ("Notification" in window) Notification.requestPermission();
            navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => console.log("Mic denied"));
        };

        function sync() {
            set(ref(db, `users/${myId}`), { id: myId, name: myName, avatar: myAv, lastSeen: Date.now() });
            const el = document.getElementById('my-av');
            if(myAv.startsWith('http')) el.innerHTML = `<img src="${myAv}">`; else el.innerHTML = myAv;
        }
        sync();

        // CHAT ENGINE DENGAN JAM & STATUS BULAT
        window.openChat = (u) => {
            curT = u;
            document.getElementById('v-chat').style.transform = 'translateX(0)';
            document.getElementById('c-n').innerText = u.name;
            const chatID = [myId, u.id].sort().join('_');
            
            onValue(ref(db, 'messages/' + chatID), (snap) => {
                const area = document.getElementById('m-area'); area.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const time = new Date(d.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    // Logika Bulat: 1 bulat = Terkirim, 2 bulat (berwarna) = Dibaca
                    const statusHtml = d.sender === myId ? `<div class="status-dot"></div><div class="status-dot ${d.read?'status-read':''}"></div>` : '';
                    
                    const div = document.createElement('div');
                    div.className = `bubble ${d.sender === myId ? 'b-me' : 'b-them'}`;
                    div.innerHTML = `${d.text} <div class="m-info">${time} ${statusHtml}</div>`;
                    area.appendChild(div);
                    if(d.sender !== myId && !d.read) update(ref(db, `messages/${chatID}/${m.key}`), { read: true });
                });
                area.scrollTop = area.scrollHeight;
            });
        };

        window.sendMsg = () => {
            const txt = document.getElementById('m-in').value;
            if(!txt || !curT) return;
            const chatID = [myId, curT.id].sort().join('_');
            push(ref(db, 'messages/' + chatID), { sender: myId, text: txt, time: Date.now(), read: false });
            document.getElementById('m-in').value = "";
        };

        // FLOW TRANSISI TELPON
        window.callFlow = () => {
            const linkup = document.getElementById('trans-linkup');
            linkup.style.display = 'flex';
            setTimeout(() => {
                linkup.style.display = 'none';
                document.getElementById('call-ui').style.display = 'flex';
                document.getElementById('call-name').innerText = curT.name;
            }, 1000);
        };

        window.endCallFlow = () => {
            document.getElementById('call-ui').style.display = 'none';
            const conecta = document.getElementById('trans-conecta');
            conecta.style.display = 'flex';
            setTimeout(() => { conecta.style.display = 'none'; }, 1000);
        };

        // MANAJEMEN KONTAK
        window.showContactMenu = () => {
            const act = prompt("Ketik: 'hapus' untuk hapus kontak, 'blokir' untuk blokir, 'bersih' untuk hapus chat");
            const chatID = [myId, curT.id].sort().join('_');
            if(act === 'hapus') { remove(ref(db, `users/${myId}/friends/${curT.id}`)); window.closeChat(); }
            if(act === 'bersih') { remove(ref(db, 'messages/' + chatID)); }
            if(act === 'blokir') { set(ref(db, `users/${myId}/blocked/${curT.id}`), true); window.closeChat(); }
        };

        // REALTIME FRIENDS
        onValue(ref(db, `users/${myId}/friends`), (snap) => {
            const list = document.getElementById('chat-l'); list.innerHTML = "";
            snap.forEach(f => {
                onValue(ref(db, `users/${f.val().id}`), (u) => {
                    const d = u.val(); if(!d) return;
                    const div = document.createElement('div'); div.className = 'card';
                    div.innerHTML = `<div class="av">${d.avatar.startsWith('http')?`<img src="${d.avatar}">`:d.avatar}</div><div><b>${d.name}</b><br><small>LinkUp: ${d.id}</small></div>`;
                    div.onclick = () => openChat(d);
                    list.appendChild(div);
                });
            });
        });

        window.nav = (p) => {
            document.querySelectorAll('.page').forEach(x => x.style.display = 'none');
            document.getElementById('p-'+p).style.display = 'block';
        };

        window.closeChat = () => document.getElementById('v-chat').style.transform = 'translateX(100%)';
        window.startScanner = () => {
            const sc = new Html5Qrcode("reader"); // (Scanner logic sama seperti sebelumnya)
            alert("Scanner Aktif");
        };
    </script>
</body>
</html>
